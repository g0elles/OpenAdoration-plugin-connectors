version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    # Bumps land on dev; curated batches reach the protected master via PR.
    # Security updates still target the default branch regardless of this.
    target-branch: "dev"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
